<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Roboto&family=Lobster&display=swap" rel="stylesheet">

<style>

.font1{
font-family:Poppins;
}

.font2{
font-family:Roboto;
}

.font3{
font-family:Lobster;
}

.large{
font-size:40px;
}

.medium{
font-size:2em;
}

.small{
font-size:1rem;
}

.shadow{
text-shadow:2px 2px 5px gray;
}

</style>

</head>

<body>

<h1>Typography Demo</h1>

<p class="font1 large">Poppins Font Example</p>

<p class="font2 medium">Roboto Font Example</p>

<p class="font3 small">Lobster Font Example</p>

<p class="shadow">Text Shadow Example</p>

<p style="text-transform:uppercase;">uppercase text</p>

<p style="text-decoration:underline;">underline text</p>

</body>
</html>
